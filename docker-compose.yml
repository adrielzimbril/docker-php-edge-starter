version: '4.2'
name: oricode-docker-env
services:
    caddy:
        build:
            context: './.docker/caddy'
            dockerfile: Dockerfile
        image: oricodes/caddy:latest
        container_name: caddy
        restart: unless-stopped
        environment:
            CLOUDFLARE_API_TOKEN: '${CLOUDFLARE_API_TOKEN}'
            CLOUDFLARE_EMAIL: '${CLOUDFLARE_API_MAIL}'
            ACM_AGREE: 'true'
            TZ: 'Europe/London'
        ports:
            - '${FORWARD_CADDY_PORT:-80}:80'
            - '${FORWARD_CADDY_SSL_PORT:-443}:443'
        labels:
            caddy.acme_dns: "cloudflare ${CLOUDFLARE_API_TOKEN}"
            caddy.email: '${CLOUDFLARE_API_MAIL}'
        env_file:
            - '.env'
        networks:
            - oricode
        volumes:
            - '.:/srv/apps/starter'
            - '/var/run/docker.sock:/var/run/docker.sock'
            - './.docker/caddy/cloudflare:/etc/caddy/cloudflare'
            - './.docker/caddy/Caddyfile:/etc/caddy/Caddyfile'
            - './.docker/logs/caddy:/var/log/caddy'
            - './.docker/caddy/data:/data'
            - './.docker/caddy/config:/config'
            - './.docker/caddy/certs:/certs'
            - './.docker/caddy/caddy_ssl:/caddy_ssl'
        depends_on:
            - php
    mysql:
        image: mysql:latest
        container_name: '${DOCKER_DB_CONTAINER_NAME}'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - 'oricodes-mysql:/var/lib/mysql'
            #- './.docker/mysql/data:/var/lib/mysql'
            - './.docker/logs/mysql.log:/var/log/mysql.log'
            - './.docker/logs/mysql:/var/log/mysql'
            - './.docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf'
        networks:
            - oricode
    redis:
        image: 'redis:alpine'
        container_name: redis
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'oricodes-redis:/data'
            #- './.docker/redis:/data'
        networks:
            - oricode
    cron:
        build:
            context: './.docker/cron'
            dockerfile: Dockerfile
        image: oricodes/cron:latest
        container_name: cron
        volumes:
            - './.docker/cron/task:/etc/cron.d/task'
            - './.docker/logs/cron/cron.log:/var/log/cron.log'
        environment:
            - TZ=UTC
networks:
    oricode:
        driver: bridge
volumes:
    oricodes-redis:
        driver: local
    oricodes-mysql:
        driver: local
    oricodes-logs:
        driver: local
